
services:
  bitcoind:
    build: ./bitcoind
    container_name: bitcoind-regtest
    restart: unless-stopped
    volumes:
      - bitcoind_data:/root/.bitcoin
      - ./bitcoind/bitcoin.conf:/root/.bitcoin/bitcoin.conf:ro
    ports:
      - "18443:18443"
      - "28332:28332"
      - "28333:28333"
      - "18444:18444"
    entrypoint: ["/root/entrypoint.sh"]
    networks: 
      regtest_net:
        ipv4_address: 172.28.0.2


volumes:
  bitcoind_data:

networks:
  regtest_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16