[regtest]
# REGTEST CORE
regtest=1
server=1
listen=1

txindex=1
fallbackfee=0.0002

printtoconsole=1


rpcuser=user
rpcpassword=pass

rpcbind=0.0.0.0
rpcallowip=172.28.0.0/16
rpcport=18443


# ZMQ EVENT STREAM
zmqpubrawtx=tcp://0.0.0.0:28332
zmqpubrawblock=tcp://0.0.0.0:28333


# WALLET
disablewallet=0
walletdir=/home/bitcoin/.bitcoin/wallets

#Sim begrenzungen
dbcache=100
maxmempool=50
maxconnections=10
par=1
